.card{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:16/10;cursor:pointer;background:#111;border:1px solid rgba(255,255,255,.03);transition:.3s}

.co h3{color:#c9a96e;font-size:1rem;margin-bottom:2px}
.co span{color:#999;font-size:.75rem}

.about{max-width:800px;margin:0 auto 50px;text-align:center}
.about p{color:#aaa;line-height:1.8;font-size:.95rem}
.tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:15px}
.tags span{background:rgba(255,255,255,.04);padding:5px 12px;border-radius:20px;font-size:.78rem;color:#999;border:1px solid rgba(255,255,255,.06)}

.accounts{gap:16px}
.acard{background:#111;border-radius:10px;padding:20px;border:1px solid rgba(255,255,255,.04)}
.acard h3{color:#c9a96e;font-size:1.1rem;margin-bottom:8px}
.acard p{color:#999;font-size:.85rem;line-height:1.6}

.bottom{text-align:center;padding:40px 20px 60px;color:#666;font-size:.8rem;border-top:1px solid rgba(255,255,255,.04)}
.bottom .cta{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.bottom .cta span{color:#c9a96e;font-size:1rem}

#vg .card::before{content:"▶";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;pointer-events:none;font-size:3rem;color:rgba(255,255,255,.9);text-shadow:0 2px 12px rgba(0,0,0,.6)}

@media(max-width:768px){.hero-c h1{font-size:2.2rem}.g{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}}
