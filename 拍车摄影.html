<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0a0a;color:#e0e0e0}
a{color:#c9a96e;text-decoration:none}
.back-link{display:inline-block;color:#c9a96e;padding:12px 18px;font-size:0.85rem;position:fixed;top:12px;left:12px;z-index:100;background:rgba(10,10,10,0.9);border-radius:6px;border:1px solid rgba(201,169,110,0.15)}
section{padding:80px 20px;max-width:1300px;margin:0 auto}
h2{text-align:center;color:#c9a96e;font-size:1.8rem;margin-bottom:35px}
h2::after{content:'';display:block;width:35px;height:2px;background:#c9a96e;margin:10px auto 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.item{position:relative;border-radius:6px;overflow:hidden;aspect-ratio:4/3;cursor:pointer;transition:0.3s}
.item:hover{transform:scale(1.02)}
.item img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.55),transparent 60%);opacity:0;transition:0.3s;display:flex;align-items:flex-end;padding:12px}
.item:hover .overlay{opacity:1}
.overlay span{color:#fff;font-size:0.8rem}
.lb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);align-items:center;justify-content:center}
.lb.active{display:flex}
.lb img{max-width:92%;max-height:92%;border-radius:4px}
.lb-close{position:absolute;top:20px;right:30px;color:#fff;font-size:2.2rem;cursor:pointer}
</style></head>
