<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摄影师小岳 · 🎨 调色作品</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0a0a;color:#e0e0e0}
a{color:#c9a96e;text-decoration:none}
.back-link{display:inline-block;color:#c9a96e;padding:12px 18px;font-size:0.85rem;position:fixed;top:12px;left:12px;z-index:100;background:rgba(10,10,10,0.9);border-radius:6px;border:1px solid rgba(201,169,110,0.15)}
section{padding:80px 20px;max-width:1300px;margin:0 auto}
h2{text-align:center;color:#c9a96e;font-size:1.8rem;margin-bottom:35px}
h2::after{content:'';display:block;width:35px;height:2px;background:#c9a96e;margin:10px auto 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:18px}
.card{background:#111;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.04);transition:0.3s}
.card:hover{transform:translateY(-2px);border-color:rgba(201,169,110,0.15)}
.card video{width:100%;display:block;background:#000;object-fit:contain;max-height:300px}
.info{padding:12px 15px}
.info h3{color:#c9a96e;font-size:0.9rem;margin-bottom:3px}
.info p{color:#777;font-size:0.75rem}
</style></head>
<body>
<a href="./index.html" class="back-link">← 返回主页</a>

<div class="card"><video controls preload="auto"><source src="https://photographer-resume.oss-cn-hangzhou.aliyuncs.com/video/%E8%B0%83%E8%89%B2/%E6%B5%B7%E8%BE%B9%E8%90%BD%E6%97%A5.mp4" type="video/mp4"></video><div class="info"><h3>调色6海边落日</h3></div></div>
</div></section></body></html>
