<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>摄影师小岳 · 竖屏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0a0a;color:#e0e0e0}
.back{display:inline-block;color:#c9a96e;padding:10px 16px;font-size:0.8rem;position:fixed;top:10px;left:10px;z-index:100;background:rgba(10,10,10,0.9);border-radius:5px;border:1px solid rgba(201,169,110,0.12)}
section{padding:70px 20px;max-width:1400px;margin:0 auto}
h2{text-align:center;color:#c9a96e;font-size:1.6rem;margin-bottom:30px}
h2::after{content:'';display:block;width:30px;height:2px;background:#c9a96e;margin:8px auto 0}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.item{position:relative;border-radius:6px;overflow:hidden;aspect-ratio:4/3;background:#111;border:1px solid rgba(255,255,255,0.03);transition:.3s}
.item:hover{transform:scale(1.02)}
.item video,.item img{width:100%;height:100%;object-fit:cover;display:block}
.lb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);align-items:center;justify-content:center}
.lb.on{display:flex}
.lb img{max-width:92%;max-height:92%;border-radius:3px}
.lb-close{position:absolute;top:20px;right:30px;color:#fff;font-size:2rem;cursor:pointer}
</style></head><body>
