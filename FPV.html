<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摄影师小岳 · 🏎️ FPV穿越机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0a0a;color:#e0e0e0}
a{color:#c9a96e;text-decoration:none}
.back-link{display:inline-block;color:#c9a96e;padding:12px 18px;font-size:0.85rem;position:fixed;top:12px;left:12px;z-index:100;background:rgba(10,10,10,0.9);border-radius:6px;border:1px solid rgba(201,169,110,0.15)}
section{padding:80px 20px;max-width:1300px;margin:0 auto}
h2{text-align:center;color:#c9a96e;font-size:1.8rem;margin-bottom:35px}
h2::after{content:'';display:block;width:35px;height:2px;background:#c9a96e;margin:10px auto 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:18px}
.card{background:#111;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.04);transition:0.3s}
.card:hover{transform:translateY(-2px);border-color:rgba(201,169,110,0.15)}
.card video{width:100%;display:block;background:#000;object-fit:contain;max-height:300px}
.info{padding:12px 15px}
.info h3{color:#c9a96e;font-size:0.9rem;margin-bottom:3px}
.info p{color:#777;font-size:0.75rem}

.video-wrap{position:relative;display:inline-block;width:100%}
.video-wrap::after{content:"";position:absolute;inset:0;pointer-events:none;background:rgba(0,0,0,.25);z-index:1}
.video-wrap::before{content:"▶";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;font-size:2.5rem;color:rgba(255,255,255,.85);text-shadow:0 2px 10px rgba(0,0,0,.6);font-family:sans-serif}
.video-wrap video{display:block;width:100%}
</style></head>
<body>
<a href="./index.html" class="back-link">← 返回主页</a>
<section><h2>🏎️ FPV穿越机</h2><div class="grid">
<div class="card"><div class="video-wrap"><video controls preload="auto"><source src="https://photographer-resume.oss-cn-hangzhou.aliyuncs.com/video/FPV%E6%8B%8D%E6%91%84/%E6%96%B9%E7%89%B9%E7%83%9F%E8%8A%B1.mp4" type="video/mp4"></video></div><div class="info"><h3>11.12田横飘逸（完）</h3></div></div>
<div class="card"><div class="video-wrap"><video controls preload="auto"><source src="https://photographer-resume.oss-cn-hangzhou.aliyuncs.com/video/FPV%E6%8B%8D%E6%91%84/%E6%B2%99%E6%BB%A9%E9%A3%98%E9%80%B8.mp4" type="video/mp4"></video></div><div class="info"><h3>6d760dc04b0eddb1f47bcb98855ab0</h3></div></div>
</div></section>
<script>
(function(){
var videos=document.querySelectorAll('video');
var playing=null;
videos.forEach(function(v){
v.addEventListener('play',function(){
if(playing && playing!==v) playing.pause();
playing=v;
if(v.requestFullscreen) v.requestFullscreen();
else if(v.webkitRequestFullscreen) v.webkitRequestFullscreen();
else if(v.msRequestFullscreen) v.msRequestFullscreen();
});
v.addEventListener('ended',function(){playing=null;});
});
})();
</script>

</body></html>
